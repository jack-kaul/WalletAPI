services:

  # ── MySQL ─────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: wallet-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: walletdb
      MYSQL_USER: walletuser
      MYSQL_PASSWORD: walletpass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "walletuser", "-pwalletpass"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────
  # ✅ STEP 4: Redis added.
  # redis:alpine is a tiny image (~30MB). No password needed for local dev.
  redis:
    image: redis:7-alpine
    container_name: wallet-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot App ───────────────────────────────────────────────
  # ✅ STEP 5: App containerised.
  # "build: ." tells Docker Compose to build from the Dockerfile in
  # the current directory instead of pulling a pre-built image.
  app:
    build: .
    container_name: wallet-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # These override the ${MYSQL_HOST:localhost} and ${REDIS_HOST:localhost}
      # placeholders in application.yml. Inside Docker's network, services
      # are reachable by their service name, not localhost.
      MYSQL_HOST: mysql
      REDIS_HOST: redis
    depends_on:
      mysql:
        condition: service_healthy   # waits for MySQL to pass its healthcheck
      redis:
        condition: service_healthy   # waits for Redis to pass its healthcheck

volumes:
  mysql_data:
